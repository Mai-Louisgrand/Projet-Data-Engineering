# Orchestration complète de l’environnement Data Engineering en local via Docker Compose
# (streaming, traitement distribué, stockage et orchestration des pipelines).

services:
# streaming
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"  # pas d’auto-création de topics
    volumes:
      - kafka-data:/var/lib/kafka/data

# traitement distribué
  spark-master:
    image: spark:latest
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - RUNNING_IN_DOCKER=1
    volumes:
      - ./:/opt/app
    ports:
      - "7077:7077"
      - "8081:8080"
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"] # exécute en mode serveur

  spark-worker:
    image: spark:latest
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - RUNNING_IN_DOCKER=1
      - SPARK_MASTER_URL=spark://spark-master:7077
    volumes:
      - ./:/opt/app
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]

# stockage
  postgres:
    image: postgres:15
    container_name: postgres
    environment: # credentials simplifiés pour un environnement local de développement
      POSTGRES_USER: data
      POSTGRES_PASSWORD: data
      POSTGRES_DB: covid_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

# orchestration	
  airflow-db:
    image: postgres:15
    container_name: airflow-db
    environment: # credentials simplifiés pour un environnement local de développement
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db:/var/lib/postgresql/data

  airflow-webserver:
    build:
      context: ./docker
      dockerfile: Dockerfile.airflow
    container_name: airflow-webserver
    depends_on:
      - airflow-db
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PYTHONPATH: /opt/airflow # pour les import src dans scripts python
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs:cached
      - ./src:/opt/airflow/src # accès code métier depuis Airflow
      - ./scripts:/opt/airflow/scripts # accès scripts bash depuis Airflow
      - ./data:/opt/airflow/data # accès data
    ports:
      - "8080:8080"
    command: "airflow webserver"

  airflow-scheduler:
    build:
      context: ./docker
      dockerfile: Dockerfile.airflow
    container_name: airflow-scheduler
    depends_on:
      - airflow-db
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PYTHONPATH: /opt/airflow # pour les import src dans scripts python
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs:cached
      - ./src:/opt/airflow/src # accès code métier depuis Airflow
      - ./scripts:/opt/airflow/scripts # accès scripts bash depuis Airflow
      - ./data:/opt/airflow/data # accès data
    command: scheduler

volumes:
  airflow_db:
  kafka-data:
  postgres_data:
  mongo-data: