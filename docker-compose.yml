# ============================================================
# Local Data Engineering Platform (Docker Compose)
#
# This environment provides:
# - Streaming layer (Kafka + Zookeeper)
# - Distributed processing (Apache Spark cluster)
# - Workflow orchestration (Apache Airflow)
#
# Target use case:
# - Local development & integration testing
# - End-to-end batch + streaming pipelines
# ============================================================
services:
  # ===========================
  # STREAMING LAYER (Kafka)
  # ===========================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Dual listener configuration (internal Docker network + host access)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka-data:/var/lib/kafka/data

  # ===========================
  # DISTRIBUTED PROCESSING (Apache Spark)
  # ===========================
  spark-master:
    build:
      context: ./docker
      dockerfile: Dockerfile.spark
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - RUNNING_IN_DOCKER=1
      - GOOGLE_APPLICATION_CREDENTIALS=/home/airflow/.config/gcloud/application_default_credentials.json
      - GOOGLE_CLOUD_PROJECT=owid-covid-19-data-engineering
    volumes:
      - ./:/opt/app
      - ${HOME}/.config/gcloud:/home/airflow/.config/gcloud:ro
    ports:
      - "7077:7077"
      - "8081:8080"
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]

  spark-worker:
    build:
      context: ./docker
      dockerfile: Dockerfile.spark
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - RUNNING_IN_DOCKER=1
      - SPARK_MASTER_URL=spark://spark-master:7077
      - GOOGLE_APPLICATION_CREDENTIALS=/home/airflow/.config/gcloud/application_default_credentials.json
      - GOOGLE_CLOUD_PROJECT=owid-covid-19-data-engineering
    volumes:
      - ./:/opt/app
      - ${HOME}/.config/gcloud:/home/airflow/.config/gcloud:ro
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]

  # ===========================
  # ORCHESTRATION LAYER (Apache Airflow)
  # ===========================
  airflow-db:
    image: postgres:15
    container_name: airflow-db
    environment: # Simplified credentials for local development only
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db:/var/lib/postgresql/data

  airflow-webserver:
    user: root
    build:
      context: ./docker
      dockerfile: Dockerfile.airflow
    container_name: airflow-webserver
    depends_on:
      - airflow-db
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PYTHONPATH: /opt/airflow # enable imports from the project src directory in Python scripts
      RUNNING_IN_DOCKER: "1"
      GOOGLE_APPLICATION_CREDENTIALS: /home/airflow/.config/gcloud/application_default_credentials.json
      GOOGLE_CLOUD_PROJECT: owid-covid-19-data-engineering
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs:cached
      - ./src:/opt/airflow/src # business logic
      - ./scripts:/opt/airflow/scripts # bash scripts
      - ./data:/opt/airflow/data # shared datasets & checkpoints
      - ${HOME}/.config/gcloud:/home/airflow/.config/gcloud:ro # credentials for GCS
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    command: "airflow webserver"

  airflow-scheduler:
    user: root
    build:
      context: ./docker
      dockerfile: Dockerfile.airflow
    container_name: airflow-scheduler
    depends_on:
      - airflow-db
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PYTHONPATH: /opt/airflow # for import in python scripts
      RUNNING_IN_DOCKER: "1"
      GOOGLE_APPLICATION_CREDENTIALS: /home/airflow/.config/gcloud/application_default_credentials.json
      GOOGLE_CLOUD_PROJECT: owid-covid-19-data-engineering
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs:cached
      - ./src:/opt/airflow/src
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - ${HOME}/.config/gcloud:/home/airflow/.config/gcloud:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler

# ===========================
# PERSISTENT VOLUMES
# ===========================
volumes:
  airflow_db:
  kafka-data: